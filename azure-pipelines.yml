trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Use Node.js 20'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm test
    displayName: 'Run tests'

  - script: npm run test:coverage
    displayName: 'Run coverage gate'

  - script: node src/dist/cli.js analyze src/ --format json --output sentinel-report.json || true
    displayName: 'Run Sentinel analysis'

  - script: |
      if grep -q '"severity": "critical"' sentinel-report.json; then
        echo "##vso[task.logissue type=error]Critical findings detected by Sentinel"
        exit 1
      fi
    displayName: 'Fail on critical findings'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'coverage'
      ArtifactName: 'coverage-report'
      publishLocation: 'Container'
    condition: always()

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'sentinel-report.json'
      ArtifactName: 'sentinel-report'
      publishLocation: 'Container'
    condition: always()
