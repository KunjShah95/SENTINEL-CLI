name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill this out as completely as possible.

  - type: input
    id: version
    attributes:
      label: Sentinel Version
      description: Run `sentinel --version` or `npx sentinel --version`
      placeholder: "1.9.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Docker
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command You Ran
      description: The exact command that triggered the bug
      placeholder: "sentinel analyze src/ --format sarif"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the full error output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Sentinel Config (if relevant)
      description: Contents of your `.sentinelrc.json` or `sentinel.config.js` (remove any secrets)
      render: json

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help (links, screenshots, related issues)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using a supported Node.js version (≥18)
          required: true
        - label: I have removed any sensitive data (API keys, tokens) from this report
          required: true
