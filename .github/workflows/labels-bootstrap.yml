name: Bootstrap Repository Labels

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/labels-bootstrap.yml

permissions:
  issues: write

jobs:
  bootstrap-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure automation labels exist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              { name: 'needs-triage', color: 'BFDADC', description: 'Needs initial maintainer triage' },
              { name: 'security', color: 'D73A4A', description: 'Security-related issue' },
              { name: 'bug', color: 'D73A4A', description: 'Something is not working' },
              { name: 'enhancement', color: 'A2EEEF', description: 'New feature or request' },
              { name: 'documentation', color: '0075CA', description: 'Documentation updates' },
              { name: 'performance', color: 'FBCA04', description: 'Performance-related concern' },
              { name: 'good first issue', color: '7057FF', description: 'Good for first-time contributors' },
              { name: 'sentinel-finding', color: '5319E7', description: 'Automatically created by Sentinel' },
              { name: 'critical', color: 'B60205', description: 'Critical severity issue' },
              { name: 'automated', color: 'C5DEF5', description: 'Opened by automation' },
              { name: 'analyzer-request', color: '0E8A16', description: 'Request for new analyzer/language support' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Updated label: ${label.name}`);
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Created label: ${label.name}`);
              }
            }
