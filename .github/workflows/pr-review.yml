name: Sentinel PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ──────────────────────────────────────────────────
  # 1. Analyze only the PR diff (changed files)
  # ──────────────────────────────────────────────────
  sentinel-pr-review:
    name: Sentinel Security Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve PR automation route
        id: route
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const handlers = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/integrations/githubAutomationHandlers.js`).href);
            const result = handlers.determineAutomationActions({
              eventName: context.eventName,
              action: context.payload.action,
              pull_request: context.payload.pull_request,
            });

            fs.writeFileSync('sentinel-pr-route.json', JSON.stringify(result, null, 2));

            core.setOutput('run_pr_review', result.actions.includes('run_pr_review') ? 'true' : 'false');
            core.setOutput('run_pr_relevance_check', result.actions.includes('run_pr_relevance_check') ? 'true' : 'false');
            core.setOutput('run_related_issue_linker', result.actions.includes('run_related_issue_linker') ? 'true' : 'false');
            core.setOutput('run_pr_labeler', result.actions.includes('run_pr_labeler') ? 'true' : 'false');

            console.log(`Sentinel PR route actions: ${result.actions.join(', ') || '(none)'}`);

      - name: Get changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });
            // Only analyze source files, not lock files or docs
            const analyzable = files
              .filter(f => f.status !== 'removed')
              .filter(f => /\.(js|ts|jsx|tsx|py|go|rb|java|cs|php|rs)$/.test(f.filename))
              .map(f => f.filename);
            core.setOutput('json', JSON.stringify(analyzable));
            const quoted = analyzable.map(f => `"${f}"`);
            core.setOutput('quoted', quoted.join(' '));
            return analyzable.join(' ');

      - name: Run Sentinel on changed files
        id: sentinel
        if: steps.route.outputs.run_pr_review == 'true'
        run: |
          FILES="${{ steps.changed-files.outputs.quoted }}"
          if [ -z "$FILES" ]; then
            echo "No analyzable source files changed."
            echo "issues_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          node src/core/cli.js analyze $FILES \
            --format json \
            --output sentinel-pr-report.json \
            || true
          echo "issues_found=true" >> $GITHUB_OUTPUT
        env:
          SENTINEL_PR_MODE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze base branch for score delta
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        continue-on-error: true
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const {execSync}=require('child_process'); const files=JSON.parse(process.env.FILES_JSON||'[]'); const base=process.env.BASE_SHA; fs.rmSync('.sentinel-base',{recursive:true,force:true}); for(const f of files){ try { const content=execSync(`git show ${base}:${f}`, {encoding:'utf8', stdio:['pipe','pipe','ignore']}); const out=path.join('.sentinel-base', f); fs.mkdirSync(path.dirname(out), {recursive:true}); fs.writeFileSync(out, content); } catch(e) {} }"
          if [ -d .sentinel-base ]; then
            node src/core/cli.js analyze .sentinel-base --format json --output sentinel-base-report.json || true
          fi
        env:
          FILES_JSON: ${{ steps.changed-files.outputs.json }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Compute security score delta
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const util = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/utils/prIntelligence.js`).href);

            function readReport(path) {
              if (!fs.existsSync(path)) return { issues: [] };
              try { return JSON.parse(fs.readFileSync(path, 'utf8')); }
              catch { return { issues: [] }; }
            }

            const headReport = readReport('sentinel-pr-report.json');
            const baseReport = readReport('sentinel-base-report.json');

            const payload = util.computeScoreDelta({
              baseIssues: baseReport.issues || [],
              headIssues: headReport.issues || [],
            });

            fs.writeFileSync('sentinel-score-delta.json', JSON.stringify(payload, null, 2));

            const historyItem = util.buildScoreHistoryEntry({
              pullRequestNumber: context.payload.pull_request.number,
              runId: process.env.GITHUB_RUN_ID,
              sha: context.payload.pull_request.head.sha,
              ...payload,
            });
            fs.writeFileSync('sentinel-score-history.json', JSON.stringify([historyItem], null, 2));

      - name: Post review comment on PR
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('sentinel-pr-report.json')) return;

            const report = JSON.parse(fs.readFileSync('sentinel-pr-report.json', 'utf8'));
            const issues = report.issues || [];
            const scoreDelta = fs.existsSync('sentinel-score-delta.json')
              ? JSON.parse(fs.readFileSync('sentinel-score-delta.json', 'utf8'))
              : null;

            const criticalCount = issues.filter(i => i.severity === 'critical').length;
            const highCount     = issues.filter(i => i.severity === 'high').length;
            const mediumCount   = issues.filter(i => i.severity === 'medium').length;
            const lowCount      = issues.filter(i => i.severity === 'low').length;
            const total         = issues.length;

            let status = total === 0 ? '✅ All clear' : (criticalCount + highCount > 0 ? '🔴 Action required' : '🟡 Review suggested');

            let body = `## 🛡️ Sentinel Security Review — ${status}\n\n`;

            if (total === 0) {
              body += `No issues found in the changed files. Great work!\n`;
            } else {
              body += `| Severity | Count |\n|----------|-------|\n`;
              if (criticalCount) body += `| 🔴 Critical | ${criticalCount} |\n`;
              if (highCount)     body += `| 🟠 High     | ${highCount} |\n`;
              if (mediumCount)   body += `| 🟡 Medium   | ${mediumCount} |\n`;
              if (lowCount)      body += `| 🔵 Low      | ${lowCount} |\n`;
              body += `\n`;

              // Top issues detail
              const topIssues = issues
                .sort((a, b) => ['critical','high','medium','low'].indexOf(a.severity) - ['critical','high','medium','low'].indexOf(b.severity))
                .slice(0, 10);

              body += `### Top Findings\n\n`;
              for (const issue of topIssues) {
                const sev = {critical: '🔴', high: '🟠', medium: '🟡', low: '🔵'}[issue.severity] || 'ℹ️';
                body += `${sev} **${issue.type || issue.title || 'Issue'}** — \`${issue.file || 'unknown'}:${issue.line || '?'}\`\n`;
                body += `> ${issue.message || issue.description || ''}\n`;
                if (issue.suggestion) body += `> 💡 **Fix**: ${issue.suggestion}\n`;
                if (issue.cwe) body += `> 📖 [${issue.cwe}](https://cwe.mitre.org/data/definitions/${issue.cwe.replace('CWE-','')}.html)\n`;
                body += `\n`;
              }

              if (issues.length > 10) {
                body += `<details><summary>View all ${issues.length} findings</summary>\n\n`;
                for (const issue of issues.slice(10)) {
                  body += `- **${issue.type || 'Issue'}** — \`${issue.file}:${issue.line}\` — ${issue.message}\n`;
                }
                body += `\n</details>\n`;
              }
            }

            if (scoreDelta) {
              const deltaIcon = scoreDelta.delta > 0 ? '📈' : (scoreDelta.delta < 0 ? '📉' : '➖');
              const deltaText = scoreDelta.delta > 0 ? `+${scoreDelta.delta}` : `${scoreDelta.delta}`;
              body += `\n### Security Score Delta\n\n`;
              body += `| Base | Head | Delta | Trend |\n|---:|---:|---:|---|\n`;
              body += `| ${scoreDelta.baseScore} | ${scoreDelta.headScore} | ${deltaText} | ${deltaIcon} ${scoreDelta.trend} |\n`;
            }

            body += `\n---\n_Analyzed by [Sentinel CLI](https://github.com/KunjShah95/SENTINEL-CLI) · [View full docs](https://github.com/KunjShah95/SENTINEL-CLI#readme)_`;

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.includes('🛡️ Sentinel Security Review'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Create GitHub Issues for critical findings
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('sentinel-pr-report.json')) return;

            const report = JSON.parse(fs.readFileSync('sentinel-pr-report.json', 'utf8'));
            const critical = (report.issues || []).filter(i => i.severity === 'critical');

            // Fetch existing open issues to avoid duplicates
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,sentinel-finding',
              per_page: 100
            });
            const existingTitles = existingIssues.map(i => i.title.toLowerCase());

            for (const finding of critical) {
              const title = `[Security] ${finding.type || 'Critical Finding'} in ${finding.file || 'codebase'}`;

              // Deduplication: skip if a very similar issue already exists
              if (existingTitles.some(t => t.includes((finding.type || '').toLowerCase()))) {
                console.log(`Skipping duplicate issue: ${title}`);
                continue;
              }

              const body = [
                `## Critical Security Finding — Auto-detected by Sentinel`,
                ``,
                `**Detected in PR:** #${context.issue.number}`,
                `**File:** \`${finding.file || 'unknown'}\``,
                `**Line:** ${finding.line || 'unknown'}`,
                `**Severity:** 🔴 Critical`,
                `**Type:** ${finding.type || 'Unknown'}`,
                ``,
                `### Description`,
                finding.message || finding.description || 'No description available.',
                ``,
                `### Suggested Fix`,
                finding.suggestion || 'Review and fix manually.',
                finding.cwe ? `\n### Reference\n[${finding.cwe}](https://cwe.mitre.org/data/definitions/${finding.cwe.replace('CWE-','')}.html)` : '',
                ``,
                `---`,
                `_Auto-created by Sentinel · [Docs](https://github.com/KunjShah95/SENTINEL-CLI#readme)_`
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'sentinel-finding', 'critical']
              });
            }

      - name: Publish inline check-run annotations
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const util = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/utils/prIntelligence.js`).href);
            if (!fs.existsSync('sentinel-pr-report.json')) return;

            const report = JSON.parse(fs.readFileSync('sentinel-pr-report.json', 'utf8'));
            const issues = report.issues || [];
            const pr = context.payload.pull_request;

            const annotations = util.buildCheckAnnotations(issues, { limit: 50 });

            const critical = issues.filter(i => (i.severity || '').toLowerCase() === 'critical').length;
            const high = issues.filter(i => (i.severity || '').toLowerCase() === 'high').length;
            const conclusion = critical > 0 ? 'failure' : (high > 0 ? 'neutral' : 'success');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Sentinel Inline Findings',
              head_sha: pr.head.sha,
              status: 'completed',
              conclusion,
              output: {
                title: `Sentinel findings: ${issues.length}`,
                summary: `Critical: ${critical} | High: ${high} | Annotated: ${annotations.length}`,
                annotations,
              },
            });

      - name: Auto-label PR by change type
        if: steps.route.outputs.run_pr_labeler == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const util = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/utils/prIntelligence.js`).href);
            const pr = context.payload.pull_request;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const report = fs.existsSync('sentinel-pr-report.json')
              ? JSON.parse(fs.readFileSync('sentinel-pr-report.json', 'utf8'))
              : { issues: [] };
            const issues = report.issues || [];
            const labelsToApply = new Set(util.detectPRChangeTypeLabels({
              prTitle: pr.title || '',
              prBody: pr.body || '',
              files: files.map(f => f.filename),
              issues,
            }));

            const labelSpecs = {
              'security-fix': { color: 'B60205', description: 'PR includes security-related fixes or findings' },
              'performance': { color: 'FBCA04', description: 'PR targets performance improvements or issues' },
              'breaking-change': { color: 'D93F0B', description: 'PR introduces a breaking change' },
              'documentation': { color: '0075CA', description: 'PR changes docs only' },
              'ci-cd': { color: '1D76DB', description: 'PR modifies CI/CD pipelines or automation' }
            };

            for (const name of labelsToApply) {
              const spec = labelSpecs[name];
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color: spec.color, description: spec.description });
              }
            }

            if (labelsToApply.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: Array.from(labelsToApply),
              });
            }

      - name: Close resolved auto-created critical issues
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const util = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/utils/prIntelligence.js`).href);
            if (!fs.existsSync('sentinel-pr-report.json')) return;

            const report = JSON.parse(fs.readFileSync('sentinel-pr-report.json', 'utf8'));
            const critical = (report.issues || []).filter(i => (i.severity || '').toLowerCase() === 'critical');
            const activeKeys = new Set(critical.map(i => util.buildFindingKey(i.type, i.file)));

            const prNum = context.payload.pull_request.number;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,sentinel-finding,critical',
              per_page: 100,
            });

            for (const issue of openIssues) {
              if (!issue.body || !issue.body.includes(`Detected in PR:** #${prNum}`)) continue;

              const key = util.parseIssueFindingKey(issue.body || '');

              if (!activeKeys.has(key)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ Sentinel no longer detects this critical finding in the latest PR scan. Closing as resolved.',
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }

      - name: Fail check on critical findings
        if: steps.route.outputs.run_pr_review == 'true' && steps.sentinel.outputs.issues_found == 'true'
        run: |
          if [ -f sentinel-pr-report.json ]; then
            CRITICALS=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('sentinel-pr-report.json','utf8')); console.log((r.issues||[]).filter(i=>i.severity==='critical').length)")
            if [ "$CRITICALS" -gt 0 ]; then
              echo "❌ $CRITICALS critical security issue(s) found. Merge blocked."
              exit 1
            fi
            echo "✅ No critical issues. PR may proceed."
          fi

      - name: Upload Sentinel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-pr-report
          path: sentinel-pr-report.json
          retention-days: 30

      - name: Upload score delta report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-score-delta
          path: sentinel-score-delta.json
          retention-days: 30

      - name: Upload score history report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-score-history
          path: sentinel-score-history.json
          retention-days: 30

      - name: Upload PR route decision report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-pr-route
          path: sentinel-pr-route.json
          retention-days: 30

  # ──────────────────────────────────────────────────
  # 2. Check if this PR duplicates an existing one
  # ──────────────────────────────────────────────────
  pr-relevance-check:
    name: PR Relevance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR relevance route
        id: route
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const handlers = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/integrations/githubAutomationHandlers.js`).href);
            const result = handlers.determineAutomationActions({
              eventName: context.eventName,
              action: context.payload.action,
              pull_request: context.payload.pull_request,
            });

            fs.writeFileSync('sentinel-pr-relevance-route.json', JSON.stringify(result, null, 2));

            core.setOutput('run_pr_relevance_check', result.actions.includes('run_pr_relevance_check') ? 'true' : 'false');
            core.setOutput('run_related_issue_linker', result.actions.includes('run_related_issue_linker') ? 'true' : 'false');
            console.log(`Sentinel relevance route actions: ${result.actions.join(', ') || '(none)'}`);

      - name: Check PR relevance
        if: steps.route.outputs.run_pr_relevance_check == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { pathToFileURL } = require('url');
            const util = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/utils/prIntelligence.js`).href);
            const pr = context.payload.pull_request;
            const prTitle = pr.title || '';
            const prBody  = pr.body || '';

            // Get all other open PRs
            const { data: openPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            const { data: currentFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const candidateSummaries = [];
            for (const candidate of openPRs.filter(p => p.number !== pr.number).slice(0, 20)) {
              const { data: candidateFiles } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: candidate.number,
                per_page: 100
              });

              candidateSummaries.push({
                number: candidate.number,
                title: candidate.title,
                body: candidate.body || '',
                files: candidateFiles.map(f => f.filename),
              });
            }

            const duplicates = util.rankDuplicatePullRequests({
              prTitle,
              prBody,
              currentFiles: currentFiles.map(f => f.filename),
              candidates: candidateSummaries,
              threshold: 0.38,
              limit: 5,
            });

            if (duplicates.length > 0) {
              duplicates.sort((a, b) => b.score - a.score);
              const dupeList = duplicates
                .slice(0, 5)
                .map(p => `- #${p.number}: ${p.title} _(confidence: ${Math.round(p.score * 100)}%)_`)
                .join('\n');
              const warning = [
                `<!-- sentinel-pr-intelligence:duplicate -->`,
                `## ⚠️ Possible Duplicate PR`,
                ``,
                `This PR has a similar title to the following open PR(s):`,
                ``,
                dupeList,
                ``,
                `Please review whether this PR duplicates existing work before merging.`,
                `If this is intentional, you can dismiss this warning.`,
                ``,
                `---`,
                `_Checked by Sentinel PR Intelligence_`
              ].join('\n');

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              const existing = comments.find(c => c.body.includes('sentinel-pr-intelligence:duplicate'));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: warning
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: warning
                });
              }
            }

            // Check if PR has trivial changes (only whitespace/comments)
            const files = currentFiles;

            const totalAdditions = files.reduce((sum, f) => sum + f.additions, 0);
            const totalDeletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const totalChanges   = totalAdditions + totalDeletions;

            if (totalChanges < 3 && files.length === 1) {
              const note = `<!-- sentinel-pr-intelligence:minimal -->\n## ℹ️ Minimal Change Detected\n\nThis PR only changes **${totalChanges} line(s)**. Please ensure this change is intentional and not a test/accidental commit.\n\n---\n_Checked by Sentinel PR Intelligence_`;
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              const existing = comments.find(c => c.body.includes('sentinel-pr-intelligence:minimal'));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: note
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: note
                });
              }
            }

      - name: Link PR to related issues
        if: steps.route.outputs.run_related_issue_linker == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { pathToFileURL } = require('url');
            const util = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/src/utils/prIntelligence.js`).href);
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Extract keywords from PR title/body to find related open issues
            const keywords = Array.from(new Set([
              ...util.tokenizeForSimilarity(pr.title || '').slice(0, 5),
              ...util.tokenizeForSimilarity(body).slice(0, 5)
            ])).slice(0, 6);

            if (keywords.length === 0) return;

            // Search for related open issues
            const { data: searchResults } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open ${keywords.slice(0,3).join(' ')}`,
              per_page: 15
            });

            const relatedIssues = searchResults.items.filter(i => !i.pull_request);
            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const scored = util.rankRelatedIssues({
              prTitle: pr.title || '',
              prBody: body,
              changedFiles: changedFiles.map(f => f.filename),
              issues: relatedIssues.map(i => ({
                number: i.number,
                title: i.title,
                body: i.body || '',
                url: i.html_url,
              })),
              threshold: 0.20,
              limit: 5,
            });

            if (scored.length > 0) {
              const alreadyLinked = scored.some(i => body.includes(`#${i.number}`));
              if (alreadyLinked) return;

              const issueTable = [
                '| Issue | Confidence |',
                '|---|---:|',
                ...scored.map(i => `| [#${i.number}](${i.url}) ${i.title} | ${Math.round(i.confidence * 100)}% |`)
              ].join('\n');

              const commentBody = [
                `<!-- sentinel-pr-intelligence:related-issues -->`,
                `## 🔗 Related Issues Found`,
                ``,
                `The following open issues may be related to this PR (confidence scored):`,
                ``,
                issueTable,
                ``,
                `If this PR resolves any of them, add \`Closes #<issue-number>\` to your PR description.`,
                ``,
                `---`,
                `_Linked by Sentinel PR Intelligence_`
              ].join('\n');

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              const existing = comments.find(c => c.body.includes('sentinel-pr-intelligence:related-issues'));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: commentBody
                });
              }
            }

      - name: Upload PR relevance route decision report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-pr-relevance-route
          path: sentinel-pr-relevance-route.json
          retention-days: 30
