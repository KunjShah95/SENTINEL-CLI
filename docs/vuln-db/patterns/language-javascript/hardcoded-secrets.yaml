id: hardcoded-secrets
title: Hardcoded Secrets / API Keys in Source Code
severity: high
languages: [javascript, typescript]
cwe: [CWE-798, CWE-259]
tags: [secrets, credentials, api-key, hardcoded]
description: |
  Embedding API keys, passwords, tokens, or cryptographic keys directly in source
  code creates a credential exposure risk. Secrets committed to version control
  persist in the repository history indefinitely — even if removed later, they
  remain accessible in older commits. Automated crawlers scan GitHub and other
  public repositories for exposed secrets, leading to account compromise,
  unauthorized API usage, and cloud infrastructure breaches.

  Common patterns include assigning secret values to variables directly in source
  files rather than reading them from environment variables, secret managers, or
  configuration files outside the repository.

detection: |
  Search for string literals or variable assignments that match secret-like patterns:
  - API keys matching `/sk-[A-Za-z0-9]{20,}/` (OpenAI), `/AIza[0-9A-Za-z_-]{35}/` (Google)
  - AWS access keys matching `/AKIA[0-9A-Z]{16}/`
  - Generic patterns: assignments to variables named `apiKey`, `password`, `secret`,
    `token`, `auth`, `private_key`
  - Hardcoded connection strings containing credentials (`user=... password=...`)

  Flag any assignment where:
  1. The value is a string literal in source code
  2. The value matches known secret patterns or is assigned to a credentials-named variable
  3. The file is not in a `.env`, `.gitignore`, or configuration directory

remediation: |
  1. Remove the secret from source code immediately
  2. Add the secret to environment variables or a secret manager (AWS Secrets Manager,
     HashiCorp Vault, GitHub Actions Secrets)
  3. Rotate the compromised credential — assume it has been exposed
  4. If removing from git history, use `git filter-branch` or `git filter-repo`
     (but rotate the secret first — history removal is best-effort after public exposure)
  5. Add a `.env.example` file with placeholder values and document required vars
  6. Use tools like `dotenv` to load secrets at runtime

example:
  vulnerable: |
    const OPENAI_API_KEY = 'sk-proj-XXX_EXAMPLE_KEY_XXX';
    const stripe = new Stripe('sk_live_XXX_EXAMPLE_KEY_XXX');

    const config = {
      database: 'postgres://admin:hunter2@localhost:5432/prod'
    };

  fixed: |
    import dotenv from 'dotenv';
    dotenv.config();

    if (!process.env.OPENAI_API_KEY) {
      throw new Error('Missing OPENAI_API_KEY environment variable');
    }
    if (!process.env.STRIPE_SECRET_KEY) {
      throw new Error('Missing STRIPE_SECRET_KEY environment variable');
    }

    const openai = new OpenAI({ apiKey: process.env.OPENAI_API_KEY });
    const stripe = new Stripe(process.env.STRIPE_SECRET_KEY);

    const config = {
      database: process.env.DATABASE_URL
    };

references:
  - url: https://cwe.mitre.org/data/definitions/798.html
    title: CWE-798: Use of Hard-coded Credentials
  - url: https://cwe.mitre.org/data/definitions/259.html
    title: CWE-259: Use of Hard-coded Password
