id: hardcoded-credentials-config
title: Hardcoded Credentials in Configuration Files
severity: high
languages: [general]
cwe: [CWE-798, CWE-259]
tags: [secrets, credentials, config, infrastructure]
description: |
  Configuration files containing hardcoded database passwords, API tokens,
  SSH keys, or service credentials are a common source of credential leaks.
  Unlike source code, configuration files are often:
  - Committed to repositories with lax access controls
  - Shared between environments (dev/staging/prod config files copied)
  - Included in CI/CD artifacts, Docker images, and deployment packages
  - Logged during debugging or error reporting

  The blast radius includes not just the exposed resource but any connected
  service that trusts the same credential.
detection: |
  Check configuration files (YAML, JSON, TOML, INI, .env committed, XML,
  Dockerfiles, docker-compose files, Kubernetes manifests) for:
  - Literal values assigned to keys named password, secret, token, key, pass
  - Connection strings with embedded credentials (postgres://user:pass@...)
  - Base64-encoded credentials in config files (easily decoded)
  - Self-signed certificates or private keys in PEM format embedded inline
  - Default credentials that were never changed (admin/admin, root/toor)
  - CI/CD variables set inline instead of using secrets management

  Correlate with .gitignore and .dockerignore — if the config file is
  not in the ignore list, it will be included in the image/repo.
remediation: |
  Use a layered credential resolution strategy:
  1. Environment variables (read at runtime, not committed)
  2. Secret management services (AWS Secrets Manager, HashiCorp Vault, Azure Key Vault)
  3. Encrypted config files (SOPS, helm-secrets, git-crypt)
  4. Container orchestration secrets (Kubernetes Secrets, Docker secrets)

  For CI/CD, use the platform's secrets system (GitHub Actions Secrets,
  GitLab CI Variables, Jenkins Credentials) — never hardcode in YAML.

  If a credential was ever committed, rotate it immediately and scan the
  repository history for any use.
example:
  vulnerable: |
    # docker-compose.yml
    services:
      db:
        environment:
          POSTGRES_PASSWORD: mysecretpassword123
      api:
        environment:
          DATABASE_URL: postgres://admin:mysecretpassword123@db:5432/prod
  fixed: |
    # docker-compose.yml
    services:
      db:
        environment:
          POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      api:
        environment:
          DATABASE_URL_FILE: /run/secrets/db_url
    secrets:
      db_password:
        external: true
      db_url:
        external: true
references:
  - url: https://owasp.org/www-project-top-ten/2017/A2_2017-Broken_Authentication
    title: OWASP Top 10 A2 — Broken Authentication
  - url: https://cwe.mitre.org/data/definitions/798.html
    title: CWE-798: Use of Hard-coded Credentials
